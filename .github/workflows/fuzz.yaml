name: Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1' # Weekly Monday 03:00 UTC

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-x64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: 'false'
      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.24
      - name: Prepare fuzz corpus
        run: make -C internal/cmd/fuzz corpus
      - name: Build fuzzer
        run: make -C internal/cmd/fuzz
      - name: Fuzz
        run: cd internal/cmd/fuzz && ./fuzz ./corpus -max_total_time=14400 -rss_limit_mb=0 -timeout=100000
